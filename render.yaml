services:
  - type: web
    name: snapclass
    runtime: python
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "streamlit run app.py --server.port $PORT --server.address 0.0.0.0"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false